<!DOCTYPE html>
 <html lang="pt-BR">
 <head>
     <meta charset="UTF-8">
     <title>SISLAB - Administração V2.1.0</title>
     <style>
         body {
             font-family: Arial, sans-serif;
             display: flex;
             flex-direction: column;
             align-items: center;
             justify-content: flex-start; /* Alterado para alinhar o conteúdo ao topo */
             min-height: 100vh;
             margin: 0;
             background-color: #f4f4f4;
             padding-top: 40px; /* Adicionado padding no topo para espaçamento */
         }
         .admin-container {
             background-color: white;
             padding: 30px;
             border-radius: 8px;
             box-shadow: 0 4px 15px rgba(0,0,0,0.15);
             text-align: center;
             margin-bottom: 30px; /* Aumentado o espaçamento abaixo do container */
             width: 90%; /* Tornando o container responsivo */
             max-width: 800px; /* Largura máxima do container */
         }
         h1 {
             color: #1A2B4C;
             margin: 0; /* Remove margem padrão para controlar no container */
             font-size: 2.5em;
             font-weight: bold;
             text-align: center;
             padding: 5px 15px; /* Ajusta padding */
             border-bottom: 3px solid #CC3333; /* Linha de destaque vermelha */
             display: inline-block; /* Para a borda envolver o texto */
             letter-spacing: 1.5px; /* Espaçamento entre letras */
             text-shadow: 1px 1px 2px rgba(0,0,0,0.1); /* Sombra sutil */
             white-space: nowrap; /* Evita que o título quebre linha */
         }
         @media (max-width: 600px) {
             h1 {
                 font-size: 1.8em; /* Reduz fonte em telas menores */
                 padding: 5px 10px;
             }
             .main-header-container {
                 flex-direction: column;
                 gap: 5px;
             }
         }
         .button-group {
             display: flex;
             flex-wrap: wrap;
             justify-content: center;
             gap: 10px;
             margin-bottom: 20px;
         }
         button {
             padding: 12px 24px; /* Aumentando o padding para melhor toque e visual */
             border: none;
             border-radius: 5px;
             background-color: #1A2B4C; /* Cor padrão para botões admin */
             color: white;
             cursor: pointer;
             font-size: 1em;
             transition: background-color 0.3s ease;
         }
         button:hover {
             background-color: #0F1D33;
         }
         button.danger-button {
             background-color: #CC3333; /* Vermelho para ação perigosa */
         }
         button.danger-button:hover {
             background-color: #A02222;
         }
         p.warning {
             color: #CC3333;
             font-weight: bold;
             margin-bottom: 15px;
         }
 
         .smartlab-logo {
             width: 180px;
             height: 50px;
             flex-shrink: 0;
         }
 
         /* Contêiner do cabeçalho principal (logo + título) */
         .main-header-container {
             display: flex;
             align-items: center; /* Alinha verticalmente a logo e o texto */
             justify-content: center; /* Centraliza horizontalmente */
             margin-bottom: 25px; /* Espaço abaixo do cabeçalho */
             gap: 15px; /* Espaço entre a logo e o título */
             flex-wrap: wrap; /* Permite quebrar em telas menores */
         }
 
         /* CSS para o editor de lista de exames */
         #editorExames {
             display: none; /* Inicia oculto */
             margin-top: 20px;
             background-color: white;
             padding: 20px;
             border-radius: 8px;
             box-shadow: 0 2px 5px rgba(0,0,0,0.1);
             max-width: 800px;
             margin-left: auto;
             margin-right: auto;
             width: 90%;
             box-sizing: border-box;
         }
         #editorExames h3 {
             color: #1A2B4C;
             margin-top: 0;
             margin-bottom: 20px;
             text-align: center;
         }
         textarea#listaExamesEditor {
             width: 100%;
             height: 300px;
             padding: 10px;
             font-family: monospace;
             font-size: 1em;
             border: 1px solid #ccc;
             box-sizing: border-box;
             resize: vertical;
             margin-bottom: 15px;
         }
         .editor-buttons {
             display: flex;
             justify-content: center;
             gap: 10px;
         }
         .editor-buttons button {
             padding: 10px 15px;
         }

         /* Seção de Sincronização */
         .sync-container {
             background-color: white;
             padding: 20px 30px;
             border-radius: 8px;
             box-shadow: 0 4px 15px rgba(0,0,0,0.15);
             width: 90%;
             max-width: 800px;
             margin-bottom: 30px;
             box-sizing: border-box;
         }
         .sync-toggle {
             display: flex;
             justify-content: space-between;
             align-items: center;
             cursor: pointer;
             user-select: none;
         }
         .sync-toggle h3 {
             margin: 0;
             color: #1A2B4C;
             font-size: 1em;
         }
         .sync-toggle span { font-size: 1.2em; transition: transform 0.2s; }
         .sync-toggle.open span { transform: rotate(180deg); }
         .sync-body {
             display: none;
             margin-top: 18px;
             border-top: 1px solid #E0E6EE;
             padding-top: 18px;
         }
         .sync-field { margin-bottom: 12px; }
         .sync-field label { display: block; font-weight: bold; color: #334466; margin-bottom: 4px; font-size: 0.9em; }
         .sync-field input, .sync-field select {
             width: 100%; padding: 8px 10px; border: 1px solid #AABBDD;
             border-radius: 4px; font-size: 0.95em; box-sizing: border-box;
         }
         .sync-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
         .sync-actions button { padding: 9px 18px; font-size: 0.95em; }
         .sync-status-bar {
             margin-top: 15px; padding: 10px 14px;
             background-color: #F0F4FA; border-radius: 5px;
             font-size: 0.88em; color: #334466;
             display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
         }
         .sync-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; }
         .sync-dot.online  { background-color: #28a745; }
         .sync-dot.offline { background-color: #dc3545; }
         .sync-dot.syncing { background-color: #ffc107; animation: pulse 1s infinite; }
         @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
     </style>
     <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
 </head>
 <body>
 
     <div class="main-header-container">
         <div class="smartlab-logo">
           <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 110" width="100%" height="100%">
             <g transform="translate(200, 5)">
               <text y="55" text-anchor="middle"
                 style="font-family:'Montserrat','Arial Black',sans-serif;font-size:64px;font-weight:900;fill:#1d3557;letter-spacing:-2.5px">Smart<tspan
                 style="font-family:'Montserrat','Arial',sans-serif;font-weight:300;fill:#00b4d8;letter-spacing:-1.5px">Lab</tspan></text>
               <g transform="translate(-100, 65)">
                 <rect width="200" height="28" rx="4" ry="4" style="stroke:#1d3557;stroke-width:2;fill:none"/>
                 <text x="100" y="19" text-anchor="middle"
                   style="font-family:'Montserrat','Arial',sans-serif;font-size:16px;font-weight:900;fill:#1d3557;letter-spacing:2px">CETEP / LNAB</text>
               </g>
             </g>
           </svg>
         </div>
         <h1>Área Administrativa SISLAB</h1>
     </div>
 
     <div class="admin-container">
         <p class="warning">Cuidado: As ações nesta página podem ser irreversíveis!</p>
 
         <div class="button-group">
             <button onclick="editarListaExamesComSenha()">Editar Lista de Exames</button>
             <button class="danger-button" onclick="limparHistoricoAdmin()">Limpar TODO o Histórico</button>
             <button onclick="gerarNovoPacienteAleatorio()">Gerar Novo Paciente Aleatório</button>
             <button onclick="exportarDadosAdmin()">Exportar Dados (JSON)</button>
             <button onclick="document.getElementById('importFileInput').click()">Importar Dados (JSON)</button>
             <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="importarDadosAdmin(event)">
         </div>
 
         <p>
             <a href="index.html">Cadastro de Exames</a> |
             <a href="laudo_resultados.html">Emissão de Laudos</a>
         </p>
     </div>
 
     <!-- Seção de Sincronização -->
     <div class="sync-container">
         <div class="sync-toggle" id="syncToggle" onclick="toggleSyncPanel()">
             <h3>⚙ Configurar Sincronização</h3>
             <span>▼</span>
         </div>
         <div class="sync-body" id="syncBody">
             <div class="sync-field">
                 <label for="syncEndpoint">Endpoint da API</label>
                 <input type="text" id="syncEndpoint" placeholder="https://meu-servidor.com/api/sislab">
             </div>
             <div class="sync-field">
                 <label for="syncInterval">Intervalo de Sincronização</label>
                 <select id="syncInterval">
                     <option value="5">A cada 5 minutos</option>
                     <option value="15">A cada 15 minutos</option>
                     <option value="30">A cada 30 minutos</option>
                     <option value="60">A cada 1 hora</option>
                 </select>
             </div>
             <div class="sync-field">
                 <label for="syncApiKey">Chave de API <small>(opcional)</small></label>
                 <input type="password" id="syncApiKey" placeholder="Deixe em branco se não usar autenticação">
             </div>
             <div class="sync-actions">
                 <button onclick="salvarConfigSync()">Salvar Configuração</button>
                 <button onclick="window.SislabSync?.sincronizarAgora()">Sincronizar Agora</button>
             </div>
             <div class="sync-status-bar" id="syncStatusBar">
                 <span><span class="sync-dot offline" id="syncDot"></span><span id="syncOnlineLabel">Offline</span></span>
                 <span>Última sinc.: <b id="syncLastSync">—</b></span>
                 <span>Pendentes: <b id="syncPendentes">—</b></span>
                 <span id="syncErro" style="color:#CC3333;display:none"></span>
             </div>
         </div>
     </div>

     <div id="editorExames">
         <h3>Editar Lista de Exames</h3>
         <textarea id="listaExamesEditor"></textarea><br>
         <div class="editor-buttons">
             <button onclick="salvarListaExamesLocal()">Salvar Alterações</button>
             <button onclick="document.getElementById('editorExames').style.display='none'">Cancelar</button>
         </div>
     </div>

     <script type="module">
         import { clearHistorico, exportarDados, importarDados, getListaExamesCache, setListaExamesCache, getSyncConfig } from './data_storage.js';
         import { iniciarSync, sincronizarAgora, getSyncStatus } from './sync.js';
         window.SislabStorage = { clearHistorico, exportarDados, importarDados, getListaExamesCache, setListaExamesCache, getSyncConfig };
         window.SislabSync = { iniciarSync, sincronizarAgora, getSyncStatus };

         // Carrega configuração salva nos campos do formulário
         const cfg = getSyncConfig();
         if (cfg) {
             document.getElementById('syncEndpoint').value  = cfg.endpoint       || '';
             document.getElementById('syncInterval').value  = cfg.intervalMinutes || '5';
             document.getElementById('syncApiKey').value    = cfg.apiKey          || '';
         }

         // Inicia o timer de sync se já houver endpoint configurado
         if (cfg?.endpoint) iniciarSync();
     </script>

     <script>
         const SENHA_BASE_SISLAB_ADMIN = "sislab";

         function gerarSenhaAtual() {
             const agora = new Date();
             const horas = agora.getHours().toString().padStart(2, '0');
             const minutos = agora.getMinutes().toString().padStart(2, '0');
             return SENHA_BASE_SISLAB_ADMIN + horas + minutos;
         }

         async function limparHistoricoAdmin() {
             const senhaEsperada = gerarSenhaAtual(); // Captura antes do prompt
             const senhaDigitada = prompt(`Para limpar o histórico, digite a senha`);
             if (senhaDigitada === null) {
                 return;
             }
             if (senhaDigitada !== senhaEsperada) {
                 alert('Senha incorreta. Histórico não foi limpo.');
                 return;
             }
             const confirmDeleteAll = confirm("Tem certeza que deseja apagar TODO o histórico? Esta ação é irreversível e apagará todos os dados de pacientes!");
             if (!confirmDeleteAll) {
                 return;
             }
             if (typeof window.SislabStorage === 'undefined' || !window.SislabStorage.clearHistorico) {
                 alert("Módulo de armazenamento não inicializado. Tente novamente em instantes.");
                 return;
             }
             window.SislabStorage.clearHistorico();
             alert("Histórico apagado com sucesso!");
         }

         async function gerarNovoPacienteAleatorio() {
             alert("Uma nova aba será aberta para gerar um paciente aleatório.");
             window.open('index.html?gerar=ficticio', '_blank');
         }

         async function editarListaExamesComSenha() {
             const senhaEsperada = gerarSenhaAtual(); // Captura antes do prompt
             const senhaDigitada = prompt("Digite a senha:");
             if (senhaDigitada !== senhaEsperada) {
                 alert("Senha incorreta.");
                 return;
             }

             let conteudo = '';
             if (window.SislabStorage && window.SislabStorage.getListaExamesCache) {
                 conteudo = window.SislabStorage.getListaExamesCache() || '';
             }
             if (!conteudo) {
                 try {
                     const response = await fetch('lista-de-exames.txt');
                     if (response.ok) {
                         conteudo = await response.text();
                     }
                 } catch (error) {
                     console.warn("Não foi possível carregar lista-de-exames.txt:", error.message);
                 }
             }
             document.getElementById("listaExamesEditor").value = conteudo;
             document.getElementById("editorExames").style.display = "block";
         }

         function salvarListaExamesLocal() {
             const novoConteudo = document.getElementById("listaExamesEditor").value;
             if (window.SislabStorage && window.SislabStorage.setListaExamesCache) {
                 window.SislabStorage.setListaExamesCache(novoConteudo);
             } else {
                 localStorage.setItem('sislab_lista_exames', novoConteudo);
             }
             alert("Lista de exames salva localmente com sucesso!");
             document.getElementById("editorExames").style.display = "none";
         }

         function exportarDadosAdmin() {
             if (typeof window.SislabStorage === 'undefined' || !window.SislabStorage.exportarDados) {
                 alert("Módulo de armazenamento não inicializado. Tente novamente em instantes.");
                 return;
             }
             window.SislabStorage.exportarDados();
         }

         // ── Sincronização ──────────────────────────────────────────────

         function toggleSyncPanel() {
             const body = document.getElementById('syncBody');
             const toggle = document.getElementById('syncToggle');
             const open = body.style.display !== 'block';
             body.style.display = open ? 'block' : 'none';
             toggle.classList.toggle('open', open);
             if (open && window.SislabSync) atualizarStatusSync(window.SislabSync.getSyncStatus());
         }

         function salvarConfigSync() {
             const endpoint = document.getElementById('syncEndpoint').value.trim();
             if (!endpoint) { alert('Informe o endpoint da API.'); return; }
             const config = {
                 endpoint,
                 intervalMinutes: parseInt(document.getElementById('syncInterval').value) || 5,
                 apiKey: document.getElementById('syncApiKey').value.trim() || null
             };
             if (window.SislabStorage?.getSyncConfig !== undefined) {
                 localStorage.setItem('sislab_sync_config', JSON.stringify(config));
             }
             if (window.SislabSync) window.SislabSync.iniciarSync();
             alert('Configuração salva! Sincronização iniciada.');
         }

         function atualizarStatusSync(status) {
             if (!status) return;
             const dot = document.getElementById('syncDot');
             const label = document.getElementById('syncOnlineLabel');
             const lastSync = document.getElementById('syncLastSync');
             const pendentes = document.getElementById('syncPendentes');
             const erro = document.getElementById('syncErro');

             if (status.sincronizando) {
                 dot.className = 'sync-dot syncing'; label.textContent = 'Sincronizando...';
             } else if (status.online) {
                 dot.className = 'sync-dot online'; label.textContent = 'Online';
             } else {
                 dot.className = 'sync-dot offline'; label.textContent = 'Offline';
             }

             if (status.lastSync) {
                 const d = new Date(status.lastSync);
                 lastSync.textContent = `${d.toLocaleDateString()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
             } else {
                 lastSync.textContent = 'nunca';
             }

             pendentes.textContent = status.pendentes ?? '—';

             if (status.erro) {
                 erro.textContent = '⚠ ' + status.erro;
                 erro.style.display = 'inline';
             } else {
                 erro.style.display = 'none';
             }
         }

         document.addEventListener('sislab:sync-status', e => atualizarStatusSync(e.detail));

         // ── Importação ────────────────────────────────────────────────

         async function importarDadosAdmin(event) {
             const file = event.target.files[0];
             if (!file) return;
             if (typeof window.SislabStorage === 'undefined' || !window.SislabStorage.importarDados) {
                 alert("Módulo de armazenamento não inicializado. Tente novamente em instantes.");
                 return;
             }
             try {
                 const text = await file.text();
                 const result = window.SislabStorage.importarDados(text);
                 alert(
                     `Importação concluída!\n\n` +
                     `Histórico: ${result.addedHistorico} adicionados, ${result.skippedHistorico} ignorados (duplicados)\n` +
                     `Laudos: ${result.addedLaudos} adicionados, ${result.skippedLaudos} ignorados (duplicados)`
                 );
             } catch (err) {
                 alert('Erro ao importar dados: ' + err.message);
             }
             event.target.value = '';
         }
     </script>

 </body>
 </html>
