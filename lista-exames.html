<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SISLAB - Editor de Lista de Exames</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #E0E6EE; padding: 20px; text-align: center; }
    .main-header-container { display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; }
    .smartlab-logo { width: 180px; height: 50px; flex-shrink: 0; }
    h1 { color: #1A2B4C; border-bottom: 3px solid #CC3333; font-size: 2.5em; }
    button { padding: 10px 20px; background-color: #1A2B4C; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; margin: 5px; }
    button:hover { background-color: #0F1D33; }
    #editorExames { display: none; margin-top: 20px; background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 800px; margin-left: auto; margin-right: auto; }
    textarea { width: 100%; height: 300px; padding: 10px; font-family: monospace; font-size: 1em; border: 1px solid #ccc; box-sizing: border-box; resize: vertical; }
    p.info { color: #555; font-size: 0.9em; }
  </style>
</head>
<body>

  <div class="main-header-container">
    <div class="smartlab-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 110" width="100%" height="100%">
        <g transform="translate(200, 5)">
          <text y="55" text-anchor="middle"
            style="font-family:'Montserrat','Arial Black',sans-serif;font-size:64px;font-weight:900;fill:#1d3557;letter-spacing:-2.5px">Smart<tspan
            style="font-family:'Montserrat','Arial',sans-serif;font-weight:300;fill:#00b4d8;letter-spacing:-1.5px">Lab</tspan></text>
          <g transform="translate(-100, 65)">
            <rect width="200" height="28" rx="4" ry="4" style="stroke:#1d3557;stroke-width:2;fill:none"/>
            <text x="100" y="19" text-anchor="middle"
              style="font-family:'Montserrat','Arial',sans-serif;font-size:16px;font-weight:900;fill:#1d3557;letter-spacing:2px">CETEP / LNAB</text>
          </g>
        </g>
      </svg>
    </div>
    <h1 class="main-title">SISLAB - Editor de Lista de Exames</h1>
  </div>

  <p class="info">As alterações são salvas localmente no navegador.</p>
  <button onclick="editarListaExamesComSenha()">Editar Lista de Exames</button>
  <button onclick="window.location.href='admin.html'">Voltar ao Admin</button>

  <div id="editorExames">
    <h3>Editar Lista de Exames</h3>
    <textarea id="listaExamesEditor"></textarea><br><br>
    <button onclick="salvarListaExamesLocal()">Salvar Alterações</button>
    <button onclick="document.getElementById('editorExames').style.display='none'">Cancelar</button>
  </div>

  <script type="module">
    import { getListaExamesCache, setListaExamesCache } from './data_storage.js';
    window._listaCache = { get: getListaExamesCache, set: setListaExamesCache };
  </script>

  <script>
    function gerarSenhaAtual() {
      const agora = new Date();
      const horas = agora.getHours().toString().padStart(2, '0');
      const minutos = agora.getMinutes().toString().padStart(2, '0');
      return 'sislab' + horas + minutos;
    }

    async function editarListaExamesComSenha() {
      const senhaEsperada = gerarSenhaAtual(); // Captura antes do prompt
      const senhaDigitada = prompt("Digite a senha:");
      if (senhaDigitada !== senhaEsperada) {
        alert("Senha incorreta.");
        return;
      }

      let conteudo = '';
      if (window._listaCache && window._listaCache.get) {
        conteudo = window._listaCache.get() || '';
      }
      if (!conteudo) {
        try {
          const resp = await fetch('lista-de-exames.txt');
          if (resp.ok) conteudo = await resp.text();
        } catch (e) {
          console.warn("Não foi possível carregar lista-de-exames.txt");
        }
      }
      document.getElementById("listaExamesEditor").value = conteudo;
      document.getElementById("editorExames").style.display = "block";
    }

    function salvarListaExamesLocal() {
      const conteudo = document.getElementById("listaExamesEditor").value;
      if (window._listaCache && window._listaCache.set) {
        window._listaCache.set(conteudo);
      } else {
        localStorage.setItem('sislab_lista_exames', conteudo);
      }
      alert("Lista de exames salva localmente com sucesso!");
      document.getElementById("editorExames").style.display = "none";
    }
  </script>

</body>
</html>
